# ── STATUS: targets PROPOSED by Pit Wall — pending Michael's lock ─────────────
# Phase A scorecard. Numbers below are starting proposals with inline rationale,
# NOT yet locked. Action = approve or adjust each, then Phase B (metrics
# collector) builds against this contract.
# No baseline data exists yet (Phase B unbuilt), so proposals are judgment calls,
# not measured — revisit anything cost/throughput-driven after one baseline week.
#
# SEAT (locked 2026-06-27 by Michael): Pit Wall is a READ-ONLY TELEMETRY SURFACE,
# not a decision seat. It surfaces signal vs noise and ROUTES decisions to the
# owning persona — it does not make cross-portfolio calls or own execution. This
# matches personas/pit_wall.md ("telemetry channel, not a working channel;
# summarize and link, don't execute"). The earlier "Chief Strategist" framing was
# B&T's mapping in the Phase A plan, not Michael's intent — reverted here.
# KPIs below therefore measure REPORTING QUALITY (signal, latency, freshness,
# coverage), never execution outcomes that belong to the personas doing the work.
persona: pit_wall
display_name: "Pit Wall"
f1_analog: "Strategy Telemetry / Pit Wall stand (read-only)"
scope: |
  Cross-portfolio telemetry surface (read-only). Surfaces signal vs noise from
  every persona's scorecard plus ops telemetry, routes each decision to the
  owning persona, and feeds the twice-daily Owner's Brief. Does NOT make
  cross-portfolio calls or own execution — it reports and routes. Twice-daily
  strategic read.

cron_cadence: twice_daily
wake_times_cdt: ["07:30", "17:00"]
adversarial_review: required
escalation_email_red: michael@worshipdigital.co

kpis:
  - name: signal_to_noise_ratio
    display: "% of Pit Wall surfaced items the owning persona acted on (signal vs noise)"
    source: pit_wall_decision_log
    target: 70                  # PROPOSED — ≥70% of what Pit Wall surfaces is real signal someone acted on
    target_unit: "%"
    threshold_yellow: 50
    threshold_red: 30
    cadence: weekly
    levers:
      - "tune surfacing thresholds; audit recent false-positive surfacings"
      - "spawn lessons_extraction_agent on noisy categories"

  - name: surfacing_latency_hours
    display: "Median hours from a signal appearing in telemetry to it being surfaced/routed to the owning persona"
    source: agent_handoffs_cross_persona
    target: 6                   # PROPOSED — signal routed within a wake-cycle (twice-daily cadence ≈ 9.5h/14.5h gaps)
    target_unit: "hours (median)"
    threshold_yellow: 12
    threshold_red: 24
    cadence: daily
    levers:
      - "tighten wake cadence or add an off-cycle wake for hot lanes"
      - "add/repair a connector for a source that's surfacing late"

  - name: telemetry_freshness
    display: "% of telemetry sources pulled successfully and current at each wake (stale/missing counts against)"
    source: metrics_collector_snapshot
    target: 95                  # PROPOSED — a telemetry surface is only as good as its freshest source; near-total coverage required
    target_unit: "% sources fresh"
    threshold_yellow: 80
    threshold_red: 60
    cadence: daily
    levers:
      - "flag the broken connector to B&T"
      - "mark the source MISSING in the brief — never fabricate to fill a gap"

  - name: red_surfacing_completeness
    display: "Open decisions requiring Michael's nod (age > 48h) that were NOT surfaced top-of-brief"
    source: red_tier_queue
    target: 0
    target_unit: "count (misses)"
    threshold_yellow: 1
    threshold_red: 3
    cadence: daily
    levers:
      - "consolidate RED items into Owner's Brief top of fold"
      - "route each RED item to its owning persona's channel for action"

  - name: portfolio_health_index
    display: "Composite 0-100 score across all 9 personas (avg of green-rate)"
    source: scorecard_aggregator
    target: 85                  # PROPOSED — fleet green-rate composite ≥85/100 across all 9 personas
    target_unit: "0-100"
    threshold_yellow: 70
    threshold_red: 50
    cadence: daily
    levers:
      - "surface weakest persona in Owner's Brief"
      - "route a flag to the weakest persona to action (Pit Wall surfaces, the persona acts)"

token_budget_daily_usd: 10     # PROPOSED — twice-daily snapshot read + summarize; revisit after Phase C wake-cycle cost is measured
