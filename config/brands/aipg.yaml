# AI Phone Guy (AIPG) -- DFW home services (plumbing, HVAC, roofing, dental, PI law).
# Primary channel: cold email via Instantly (meetphoneguy/etc mailboxes, warming through ~Jul 6).
# Secondary: SMS via GHL (consent-only, when a caller signals interest).

brand: aipg
display_name: The AI Phone Guy
business_key: aiphoneguy

icp:
  # DFW-scoped for the launch cohort. Radius is roughly the metroplex.
  geo_radius:
    center: Dallas TX
    miles: 40
  segments:
    - plumbing_operator
    - hvac_operator
    - roofing_operator
    - dental_practice_manager
    - pi_law_partner
  personas:
    - owner_operator
    - operations_manager
    - office_manager

signal_sources:
  # Intent topics tuned to home-services "AI receptionist" purchase intent.
  - { name: intent_topics,     tier: T2, half_life_days: 10 }
  - { name: inbound_call,      tier: T1, half_life_days: 3 }
  - { name: meta_lead_form,    tier: T2, half_life_days: 14 }

fit_weights:
  geo_match: 30            # DFW-first; further out gets scored lower.
  persona_match: 25        # owner-operator > office manager for this offer.
  solution_qualifier: 25   # trade match (plumbing/HVAC/roofing) vs generic SMB.
  firmographic: 20         # employee count + revenue band.

channel_roster:
  - cold_email
  - sms

compliance_profile:
  channels:
    - cold_email
    - sms
  hard_rules:
    - can_spam_physical_address
    - can_spam_1click_unsub
    - google_yahoo_bulk_2024
    - tcpa_dnc_for_sms
  physical_address: "The AI Phone Guy, 508 Bluestem Dr., Aubrey, TX 76227"
  # Approved compliant footer (Quill sequences, 2026-07-07). Runner appends this
  # to every step; {{unsubscribe_url}} is the RFC 8058 one-click merge tag that
  # Instantly fills per-recipient at load-leads time (satisfies the #142 gate).
  unsubscribe_footer: |

    --
    The AI Phone Guy, 508 Bluestem Dr., Aubrey, TX 76227
    Not the right fit? Unsubscribe in one click: {{unsubscribe_url}} and I won't email again.

instantly:
  api_key_env: INSTANTLY_API_KEY_AIPG
  # AIPG has two warming secondary domains per feedback_cold_outbound_infra_rules.
  # Never send from theaiphoneguy.com primary. These are the warmed mailboxes.
  # FIXED 2026-07-11: the previous four (tyler@/hello@ meetphoneguy.com and
  # getphoneguy.com) DO NOT EXIST in the Instantly workspace — the build failed
  # 400 "Some emails are not found", which is why the AIPG campaign was never
  # created and "launch day" sent nothing. These four are the real, connected,
  # warmed mailboxes (warmup=1, status=1). info@theaiphoneguy.ai is deliberately
  # excluded: never send cold from the brand/primary domain.
  sending_accounts:
    - hello@gettheaiphoneguy.com
    - michael@gettheaiphoneguy.com
    - hello@trytheaiphoneguy.com
    - michael@trytheaiphoneguy.com
  daily_limit: 60          # under the ~50/mailbox/day post-warmup ceiling per spec section 5.
  daily_max_leads: 30
  email_gap_minutes: 12
  open_tracking: false     # Apple MPP killed open-tracking value; do not attach pixels.
  link_tracking: false
  text_only: false
  stop_on_reply: true
  stop_on_auto_reply: true
  schedule_start_hour: 8
  schedule_end_hour: 17
  schedule_timezone: America/Chicago
  schedule_days: [0, 1, 2, 3, 4]

cta_url: https://theaiphoneguy.com/book

# Approved intent-data cold sequence (Quill, 2026-07-07, Michael-approved).
# 3-step Day 0/3/7 (delay_days 3/4/0 = wait-after-step, per the P&P port).
# NO PRICE (Iron Rule #1). CTA = demo booking theaiphoneguy.com/book (Michael
# chose DEMO over the free calculator). Sender = Tyler. Verbatim copy; do not
# reword. {{firstName}}/{{companyName}} pass to Instantly native mail-merge;
# footer (address + one-click {{unsubscribe_url}}) appended by the runner.
# REWRITTEN 2026-07-12. The prior copy was unsendable for three reasons, all caught in
# pre-flight against the actual lead file:
#   1. It merged {{firstName}} and {{companyName}}. The list has NO company field at all,
#      and its first-name column did not match the email local-part (tim@premier-plumbing
#      was labelled "David"; clint@metroplumbingtx was labelled "Metro"). Every send would
#      have carried a broken or wrong merge tag. That is the same defect that forced 70
#      apology emails once already.
#   2. It stated fabricated statistics as fact ("most DFW shops your size miss a quarter to
#      a third", "over half of those callers"). Nobody has that data. It fails the
#      hero-metrics gate (no fabricated/unsourced stats).
#   3. It was signed "Tyler" while sending from michael@gettheaiphoneguy.com. Michael fronts
#      AIPG per the Foundation Bible.
# The rewrite merges ONLY {{trade}} and {{city}}, both verified per-lead (trade from the
# email domain, city from source). No stats, no invented names, no claim we cannot stand on.
# The CAN-SPAM footer + one-click unsubscribe are appended by the runner from
# compliance_profile.unsubscribe_footer, so they are deliberately NOT inline here.
icp_content:
  home_services:
    campaign_name: AIPG | DFW Home Services Intent Cold v1
    lead_file: aipg_dfw_home_services_2026-07-12.csv   # 62 leads: real email, trade verified from domain, real DFW city, website verified live
    steps:
      - delay_days: 3
        subject: "the calls that come in after five"
        body: |
          Quick question for a {{trade}} shop in {{city}}.

          When somebody calls at 7pm, or on a Saturday, or while you are under a sink with both hands full, what actually happens to that call?

          If it goes to voicemail, most people do not leave one. They call the next company on the list. You know that, because you have been the next company on the list.

          I build a 24/7 AI that answers your phone, asks the right questions, books the job on your calendar, and texts you what happened. You stay on the tools. The call still gets caught.

          Worth 15 minutes to hear it answer a call live? theaiphoneguy.com/book

          Michael
          The AI Phone Guy
      - delay_days: 4
        subject: "whoever picks up usually gets the job"
        body: |
          Following up on the one from earlier.

          Here is the part that has nothing to do with your ad budget: the shop that picks up usually gets the job. Not the best ad, not the lowest price. The one that answers.

          So when your best lead of the week calls and gets a voicemail box, that is not a missed call. That is a booked job at some other {{city}} {{trade}} company.

          The Guy answers on the first ring, nights and weekends included, qualifies the caller, books them, and texts you the details.

          Fifteen minutes and I will let you call the number yourself and hear it work: theaiphoneguy.com/book

          Michael
          The AI Phone Guy
      - delay_days: 0
        subject: "last one from me"
        body: |
          Last note, I am not going to keep filling your inbox.

          The straight version: I do not know how many calls you are missing. Nobody does until they look. What I do know is that the calls coming in at night and on weekends are usually the ones with the most urgency behind them, and those are the hardest ones to be standing next to a phone for.

          If your phone is already covered, ignore this and you will not hear from me again.

          If it is not, it is fifteen minutes and you can hear it answer: theaiphoneguy.com/book

          Michael
          The AI Phone Guy

leads_dir: ~/avo-telemetry/marketing_deliverables/aipg_intent_leads

success_metric: cost_per_meeting   # AIPG measures booked demos.

scoring_notes: |
  Speed-to-lead is the biggest lever for home services (spec section 3, cite A7):
  ~2.6x close rate at <5 min vs 24h+, 78% hire the first responder. Any inbound
  from AIPG surfaces should trigger a <5-min operator alert once GHL rails land.

inbound_webhook_notes: |
  Warm replies land in the meetphoneguy mailboxes -- item 4 (unified webhook)
  extends app.py:5910 to promote them to a Twenty Opportunity with
  quadrant=ACT-NOW or NURTURE-HOT depending on scoring. Inbound calls come
  through the AIPG GHL Voice AI receptionist and route through
  services/ghl_voice_ai_bridge.py already.
