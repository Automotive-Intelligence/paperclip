# Worship Digital (WD) -- full-service marketing partner for SMBs. Worldwide reach,
# 380 Corridor as the origin/founder-access credibility story (NOT the market ceiling).
# Intent data is ONE service among many (SEO / web / ads / social / content / email / intent).
# Primary revenue channel is WARM email via Loops (per feedback_revenue_convos_via_loops).
# Runner refuses to build in item 1 because only cold_email is wired; a Loops adapter
# is not in the item-1 scope. When WD does run a cold cohort, the Sales Desk / Quill
# path uses Smartlead (per reference_outbound_platforms_per_brand) as the warmed-secondary
# path, wired in item 5 alongside the other missing channel adapters.

brand: wd
display_name: Worship Digital
business_key: callingdigital

icp:
  # Worldwide SMB, not corridor-bound (per feedback_wd_positioning_not_faith update 2026-06-30).
  geo_radius: null
  segments:
    - med_spa_owner
    - pi_law_firm_partner
    - real_estate_team_lead
    - custom_home_builder
    - smb_owner_general
  personas:
    - founder
    - owner_operator
    - marketing_director

signal_sources:
  - { name: intent_topics,     tier: T2, half_life_days: 10 }
  - { name: meta_lead_form,    tier: T2, half_life_days: 14 }
  - { name: inbound_call,      tier: T1, half_life_days: 3 }
  # Loops behavior events (open + click on the warm-tier subset) once the
  # Loops event adapter lands in a future item.

fit_weights:
  geo_match: 10           # Worldwide, so geo is a small nudge, not a gate.
  persona_match: 30       # founder/owner > marketing director > everyone else.
  solution_qualifier: 30  # one of the 5 named verticals + real digital-marketing budget.
  firmographic: 30        # employee count + revenue band.

# WD's revenue flow is warm-email (Loops) as primary; cold cohorts go through
# Smartlead (item 5). Runner refuses build in item 1 because neither adapter
# is wired yet.
channel_roster:
  - warm_email
  - cold_email

compliance_profile:
  channels:
    - warm_email
    - cold_email
  hard_rules:
    - can_spam_physical_address
    - can_spam_1click_unsub
    - google_yahoo_bulk_2024
    - klaviyo_style_flow_sunset_90_180d
  physical_address: "Worship Digital, 508 Bluestem Dr., Aubrey, TX 76227"
  # Approved compliant footer (Quill sequences, 2026-07-07). When WD's cold path
  # runs on Smartlead (item 5), map {{unsubscribe_url}} to Smartlead's native
  # one-click token; on Loops (warm) the unsubscribe is Loops-native.
  unsubscribe_footer: |

    --
    Worship Digital, 508 Bluestem Dr., Aubrey, TX 76227
    Not the right fit? Unsubscribe in one click: {{unsubscribe_url}} and I won't email again.

# WD booking CTA. Live GHL/booking widget confirmed 2026-07-07 (task item 2).
# The WD copy file's placeholder (worshipdigital.co/strategy-call) is updated to
# this same URL so config + copy agree.
cta_url: https://the.aiappdashboard.com/widget/booking/5f6YW0cdV0Wrm0GVaU9W

# Smartlead is the cold-cohort path (item 5); Loops is the warm primary. Neither
# adapter is wired in item 1, so `runner build` REFUSES for WD (channel_roster[0]
# is warm_email, not cold_email). The approved sequence is pasted here now for
# readiness so item 5 can load it without a copy round-trip. When WD runs cold on
# Smartlead, map {{firstName}}/{{companyName}} to Smartlead's native merge syntax.
# Verbatim copy (Quill, 2026-07-07); do not reword. 3-step Day 0/3/7 (3/4/0).
icp_content:
  smb_owner_general:
    campaign_name: WD | SMB Owner Intent Cold v1
    lead_file: null   # set when the DataMoon WD SMB pull lands in leads_dir
    steps:
      - delay_days: 3
        subject: "one team instead of five vendors, {{firstName}}?"
        body: |
          {{firstName}}, most owners I talk to are stitching together five different vendors, one for the site, one for SEO, one for ads, one for social, one for email, and none of them own the whole picture. So the marketing never quite adds up, and every six months you are firing one and hiring another.
          Worship Digital is the other way to run it: one team owning your entire marketing foundation, so the strategy actually connects for {{companyName}}.
          We start with Foundations, $750 to set up and $1,500 a month with a 3-month minimum, which covers the core so you are not managing a pile of vendors anymore.
          Worth a no-pressure strategy call to see if it fits? Book one here: https://the.aiappdashboard.com/widget/booking/5f6YW0cdV0Wrm0GVaU9W
          Michael / Worship Digital
      - delay_days: 4
        subject: "the real problem with five marketing vendors"
        body: |
          {{firstName}}, quick follow-up. The real issue with five vendors is not the five invoices. It is that when leads dry up, every one of them points at the other four. Nobody owns the result.
          When one team owns your foundation, there is one plan, one point of contact, and one group accountable for whether it actually works. That is most of the value right there.
          Foundations is built to be that base for {{companyName}}, with no long lock-in past the first three months.
          Open to a strategy call this week or next? https://the.aiappdashboard.com/widget/booking/5f6YW0cdV0Wrm0GVaU9W
          Michael / Worship Digital
      - delay_days: 0
        subject: "should I leave this here, {{firstName}}?"
        body: |
          {{firstName}}, last note from me so I am not cluttering your inbox.
          If sorting out the marketing is not a right-now priority for {{companyName}}, no problem and I will leave it. If it is, a strategy call is genuinely just that, a look at what one team owning your foundation would do for you, with no obligation to sign anything.
          If the timing works: https://the.aiappdashboard.com/widget/booking/5f6YW0cdV0Wrm0GVaU9W
          Michael / Worship Digital

leads_dir: ~/avo-telemetry/marketing_deliverables/wd_intent_leads

success_metric: cost_per_strategy_call   # WD measures Strategy call bookings.

scoring_notes: |
  WD leads are ALL-brand-worldwide (not 380-Corridor-bound). The Corridor is
  the founder-access credibility story, not the market ceiling. Signal weighting
  reflects that: solution_qualifier + firmographic dominate over geo.

inbound_webhook_notes: |
  Loops handles warm replies natively via events; the unified S6 endpoint (item 4)
  subscribes to Loops event webhooks (postal_hook style) so replies land in the
  same Twenty WD workspace pipeline as any cold-Smartlead reply once that adapter
  is wired in item 5. Zero-attachment sends route through Loops with hosted-link
  dataVariables (see Sales Desk WD playbook update).
