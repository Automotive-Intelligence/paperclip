# Automotive Intelligence (AvI) -- independent auto dealerships, US.
# Primary channel: cold email via Instantly (avi mailboxes, warming through ~Jul 6).
# AvI's primary offering is AI integration consulting; intent data is one downstream service.
# The receptionist books the Phase 1 Diagnostic; this cold flow feeds the same.

brand: avi
display_name: Automotive Intelligence
business_key: autointelligence

icp:
  # US-wide for the first cohort; regional targeting via signal_sources / persona_match.
  geo_radius: null
  segments:
    - independent_dealer_principal
    - independent_dealer_gm
    - bdc_manager
    - fixed_ops_director
    - dealer_group_leader
  personas:
    - dealer_principal
    - gm
    - bdc_manager
    - fixed_ops_director
    - group_leader

signal_sources:
  # DataMoon intent topics tuned to dealership AI-adoption research.
  - { name: intent_topics,     tier: T2, half_life_days: 10 }
  - { name: meta_lead_form,    tier: T2, half_life_days: 14 }
  - { name: inbound_call,      tier: T1, half_life_days: 3 }

fit_weights:
  geo_match: 15           # US-wide launch; low weight vs the other axes.
  persona_match: 30       # dealer principal / GM > BDC manager > office staff.
  solution_qualifier: 30  # dealer has a BDC + real spend on CarGurus/vAuto/CDK/etc.
  firmographic: 25        # store count / rooftops / annual units.

channel_roster:
  - cold_email

compliance_profile:
  channels:
    - cold_email
  hard_rules:
    - can_spam_physical_address
    - can_spam_1click_unsub
    - google_yahoo_bulk_2024
  physical_address: "Automotive Intelligence, 508 Bluestem Dr., Aubrey, TX 76227"
  # Approved compliant footer (Quill sequences, 2026-07-07). Runner appends this
  # to every step; {{unsubscribe_url}} is the RFC 8058 one-click merge tag that
  # Instantly fills per-recipient at load-leads time (satisfies the #142 gate).
  unsubscribe_footer: |

    --
    Automotive Intelligence, 508 Bluestem Dr., Aubrey, TX 76227
    Not the right fit? Unsubscribe in one click: {{unsubscribe_url}} and I won't email again.

instantly:
  api_key_env: INSTANTLY_API_KEY_AVI
  # AvI sends from warmed secondary domains (never from automotiveintelligence.io).
  # Placeholder mailboxes -- confirm actual warmed set before first live send.
  sending_accounts:
    - hello@meetautointel.com
    - hello@getautointel.com
  daily_limit: 60
  daily_max_leads: 30
  email_gap_minutes: 12
  open_tracking: false
  link_tracking: false
  text_only: false
  stop_on_reply: true
  stop_on_auto_reply: true
  schedule_start_hour: 8
  schedule_end_hour: 17
  schedule_timezone: America/Chicago
  schedule_days: [0, 1, 2, 3, 4]

cta_url: https://automotiveintelligence.io/diagnostic-call

# Approved intent-data cold sequence (Quill, 2026-07-07, Michael-approved).
# 3-step Day 0/3/7 (delay_days 3/4/0 = wait-after-step, per the P&P port).
# Offer: Phase 1 AI Diagnostic $2,500. Verbatim copy; do not reword. Tokens
# {{firstName}}/{{companyName}} pass through to Instantly's native mail-merge.
# Footer (address + one-click {{unsubscribe_url}}) is appended by the runner
# from compliance_profile.unsubscribe_footer.
icp_content:
  dealers:
    campaign_name: AvI | Dealer Intent Cold v1
    lead_file: null   # set when the DataMoon dealer pull lands in leads_dir
    steps:
      - delay_days: 3
        subject: "where AI actually moves metal at {{companyName}}"
        body: |
          {{firstName}}, every week another vendor pitches you AI for the store. Most of it is noise, and not one of them can tell you where it would actually move metal in {{companyName}} versus where it just burns budget.
          That gap is the whole thing we fix. Our Phase 1 Diagnostic ($2,500, one time) looks at how your store actually runs and hands you the 2 or 3 places AI pays off first, before you spend a dollar on the tools themselves.
          Franchised or independent, it is built around your numbers, not a generic playbook.
          Worth a 30-minute diagnostic call to see if it fits? Book it here: automotiveintelligence.io/diagnostic-call
          Michael / Automotive Intelligence
      - delay_days: 4
        subject: "before you buy the next AI tool for the store"
        body: |
          {{firstName}}, quick follow-up. The dealers who get burned on AI usually are not the ones who moved too slow. They are the ones who bought the shiny tool first and found out later it never touched the metric that was actually bleeding.
          Phase 1 flips the order. We tell you the 2 or 3 highest-payoff spots in {{companyName}} first, then you decide what, if anything, to buy. No retainer, no obligation to keep working with us after the diagnostic.
          If that order makes more sense to you: automotiveintelligence.io/diagnostic-call
          Michael / Automotive Intelligence
      - delay_days: 0
        subject: "should I close the loop on this?"
        body: |
          {{firstName}}, I do not want to keep landing in your inbox, so this is the last one from me.
          If AI in the store is not a this-quarter priority for {{companyName}}, no problem at all and I will leave it there. If it is, the Phase 1 Diagnostic is the cheapest way to find out where it actually pays before you commit real budget to it.
          Either way, thanks for the read. If the timing is right: automotiveintelligence.io/diagnostic-call
          Michael / Automotive Intelligence

leads_dir: ~/avo-telemetry/marketing_deliverables/avi_intent_leads

success_metric: cost_per_diagnostic_booked   # AvI measures Phase 1 Diagnostic bookings.

scoring_notes: |
  Independent dealers are the primary ICP (not franchise-corporate). Solution
  qualifier is high-weighted because a dealer with a BDC + real vendor spend
  (CarGurus $5K+, vAuto, VinSolutions, CDK) is materially more likely to buy
  AI integration consulting than a smaller pre-owned lot.

inbound_webhook_notes: |
  Warm replies + phone bookings + form submits arrive through the receptionist
  on +1 817-635-1987 (services/ghl_voice_ai_bridge.py) and the automotive-
  intelligence.io site. Item 4 extends app.py:5910 so all four (Instantly reply,
  Meta lead-form, CallRail, receptionist bridge) POST the same unified contract.
