# Book'd -- licensed life-insurance agents (compliance-first CRM at bookd.cx).
# Co-owned with Ryan Velazquez (3velazquez LLC). Primary channel: cold email via Instantly.
# Sender identity: meetbookd + powerbookd (warming through ~Jul 6).
# NEVER send from bookd.cx primary (feedback_cold_outbound_infra_rules).
# ICP: licensed agents, older demographic (40-60), TX-first (259 TX cohort).

brand: bookd
display_name: Book'd
business_key: bookd

icp:
  # TX-first cohort; expand nationally after validation.
  geo_radius:
    center: Dallas TX
    miles: 500
  segments:
    - independent_life_agent
    - captive_life_agent
    - final_expense_specialist
    - imo_leader              # multi-tenant IMO play, per pitch 3
  personas:
    - producing_agent
    - agency_owner
    - imo_principal

signal_sources:
  # Licensed-agent registries + lead-vendor site activity as proxy for
  # "buying leads today." No open behavioral surge data yet -- treat as
  # warm-cold, not intent-triggered.
  - { name: license_registry,  tier: T3, half_life_days: 90 }
  - { name: intent_topics,     tier: T3, half_life_days: 10 }
  - { name: inbound_call,      tier: T1, half_life_days: 3 }

fit_weights:
  geo_match: 15           # TX-first launch weights TX higher; national is lower.
  persona_match: 30       # producing agent > agency owner > everyone else for v1.
  solution_qualifier: 30  # licensed + writing final expense/term > general P&C.
  firmographic: 25        # policy volume band + years in market.

channel_roster:
  - cold_email

compliance_profile:
  channels:
    - cold_email
  hard_rules:
    - can_spam_physical_address
    - can_spam_1click_unsub
    - google_yahoo_bulk_2024
    - no_income_claim         # insurance compliance: never income/earnings claims.
    - no_carrier_endorsement  # never imply carrier endorsement.
  physical_address: "Book'd, 6150 Eldorado Pkwy, Ste 190 #2036, McKinney, TX 75070"
  # NULL on purpose: the approved Book'd package (2026-07-07) carries the footer
  # (one-click {{unsubscribe_url}} + verbatim McKinney address) INLINE in each
  # step body, so the runner must NOT append a second one. If a future step is
  # added WITHOUT an inline footer, restore a footer here. #142 gate satisfied
  # by the inline {{unsubscribe_url}} in every step below.
  unsubscribe_footer: null

instantly:
  api_key_env: INSTANTLY_API_KEY_BOOKD
  # Book'd sends from warmed secondary domains ONLY. Never bookd.cx primary.
  sending_accounts:
    - michael@meetbookd.com
    - ryan@meetbookd.com
    - michael@powerbookd.com
    - ryan@powerbookd.com
  daily_limit: 60
  daily_max_leads: 30
  email_gap_minutes: 12
  open_tracking: false
  link_tracking: false
  text_only: false
  stop_on_reply: true
  stop_on_auto_reply: true
  schedule_start_hour: 8
  schedule_end_hour: 17
  schedule_timezone: America/Chicago
  schedule_days: [0, 1, 2, 3, 4]

cta_url: https://crm.bookd.cx/demo

# Approved intent-data cold sequence (Book'd package, 2026-07-07, Michael-approved).
# 3-step Day 0/3/7 (delay_days 3/4/0 = wait-after-step, per the P&P port).
# HARD COMPLIANCE: no price, no income/earnings claim, no carrier endorsement,
# no testimonials, no guarantee (the "60 policies or you don't pay" line was
# dropped). Single CTA = demo booking crm.bookd.cx/demo (PLACEHOLDER; Michael is
# confirming the real calendar link). Sender/from-name = Ryan (NOT Cole);
# sending identity = meetbookd.com / powerbookd.com only (see instantly block),
# never bookd.cx primary. Footer is INLINE in each body (address + one-click
# {{unsubscribe_url}}); unsubscribe_footer is null so the runner does not double
# it. Verbatim copy; do not reword.
icp_content:
  life_agents:
    campaign_name: Book'd | TX Life Agents Intent Cold v1
    lead_file: null   # set when the DataMoon TX life-agent pull lands in leads_dir
    steps:
      - delay_days: 3
        subject: "built for agents, by an agent"
        body: |
          Hi {{firstName}},

          Quick honest intro, agent to agent. I co-founded Book'd because the tools built
          for life agents mostly ignore how our follow-up actually has to work. You know
          the drill: a lead comes in, you owe them a callback, a text, a quote, a calendar
          invite, and by week three your spreadsheet has quietly lost half of them.

          You showed up on our radar because your agency was recently looking at
          agency-management or CRM software. So you already know the gap we built Book'd
          to close.

          Book'd is a CRM made for licensed life agents, not a generic tool with an
          insurance skin. It logs the follow-up, handles the reminders, and keeps records
          clean enough to survive a compliance review. You stay the one talking to clients.

          Worth 20 minutes to see it run? Grab a slot: https://crm.bookd.cx/demo

          Ryan
          Book'd

          Not for you? One click to opt out: {{unsubscribe_url}}
          Book'd, 6150 Eldorado Pkwy, Ste 190 #2036, McKinney, TX 75070
      - delay_days: 4
        subject: "the 15 leads your spreadsheet forgot"
        body: |
          {{firstName}},

          Following up. Here is the part no agent-management demo shows you.

          The lead is the easy part. Working fifty of them without one slipping is the
          hard part. Another call runs long, a day gets away from you, and three real
          prospects go quiet because nobody circled back. That is not a discipline
          problem. It is a tooling problem.

          Book'd was built the other way around. The reminders, the logging, the next
          step, all handled, so the follow-up runs even on your busiest week. It knows the
          questions a life agent asks and what to log for compliance and what to skip. It
          does not pretend to be your carrier or endorse one.

          Twenty minutes and I will show you it work on a real workflow, not a slide deck:
          https://crm.bookd.cx/demo

          Ryan
          Book'd

          Not for you? One click to opt out: {{unsubscribe_url}}
          Book'd, 6150 Eldorado Pkwy, Ste 190 #2036, McKinney, TX 75070
      - delay_days: 0
        subject: "the honest version"
        body: |
          {{firstName}},

          Last note from me unless you want to talk, so I am not crowding your inbox.

          Straight with you: Book'd is early. We do not have a wall of testimonials yet,
          and I am not going to invent one. Here is why I think that is the reason to look,
          not the reason to pass. One of us carries a license and worked these leads the
          same way you do, so Book'd was built around the problems that seat actually has.
          Being early means you get a founder on the phone and you help shape how it works.

          I am asking for twenty minutes, not a contract. See it run, tell me where it is
          wrong, and if it is not for you, that is useful and I will stop.

          If getting the follow-up right is still eating your week, it is worth the look:
          https://crm.bookd.cx/demo

          Ryan
          Book'd

          PS: built by Ryan (licensed agent) and Michael (operator who got tired of
          watching good agents lose deals to dropped follow-up). Two people, one product.

          Not for you? One click to opt out: {{unsubscribe_url}}
          Book'd, 6150 Eldorado Pkwy, Ste 190 #2036, McKinney, TX 75070

leads_dir: ~/avo-telemetry/marketing_deliverables/bookd_intent_leads

success_metric: cost_per_demo_booked   # Book'd measures demos booked.

scoring_notes: |
  Compliance is the hard axis for Book'd. Any signal that suggests a non-
  licensed contact (e.g., a lead-form fill from an aspiring agent) should
  score to F fit and suppress -- captive/producing agent qualifiers are
  gate criteria, not soft weights. The Ryan-verification compliance gate
  applies to any claim in Book'd copy (testimonials/case refs require Ryan
  sign-off; feedback_bookd_email_identity).

inbound_webhook_notes: |
  Warm replies land in meetbookd/powerbookd mailboxes. Item 4's unified webhook
  routes them to the Twenty Book'd workspace held for Ryan sign-off
  (services/ghl_voice_ai_bridge.py _BRAND_TO_TWENTY_KEY.bookd = None until
  released). Once Ryan signs off, flip that one line in the bridge module.
