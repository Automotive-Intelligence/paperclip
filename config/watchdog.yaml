# Watchdog coverage config. Brand/threshold specifics live here, not in code,
# so extending coverage to a new business is a config edit, not a rewrite.
#
# blog_max_age_hours: 0 disables the blog-freshness check for that brand
# (content HELD, or no blog engine yet). Everything else stays covered.
brands:
  automotive_intelligence:
    sitemap_url: https://automotiveintelligence.io/sitemap.xml
    blog_max_age_hours: 96      # cadence ~ every 2 days + headroom
    severity: warn
  ai_phone_guy:
    sitemap_url: https://theaiphoneguy.com/sitemap.xml
    blog_max_age_hours: 96
    severity: warn
  agent_empire:
    sitemap_url: https://buildagentempire.com/sitemap.xml
    blog_max_age_hours: 168     # weekly-ish; social distribution still a GAP
    severity: warn
  worship_digital:
    sitemap_url: https://worshipdigital.co/sitemap.xml
    blog_max_age_hours: 0       # blog HELD (branch drift + rename); Studio owns cadence
    severity: warn
  paper_and_purpose:
    sitemap_url: https://paperandpurpose.co/sitemap.xml
    blog_max_age_hours: 0       # no blog engine on P&P (GAP per rails ledger)
    severity: warn
  bookd:
    sitemap_url: https://bookd.cx/sitemap.xml
    blog_max_age_hours: 0       # staged, holds for Ryan
    severity: warn
site_urls:
  - https://automotiveintelligence.io
  - https://theaiphoneguy.com
  - https://worshipdigital.co
  - https://crm.worshipdigital.co
  - https://buildagentempire.com
  - https://bookd.cx
  - https://paperandpurpose.co
# weekly_social: the Studio weekly SOCIAL batch. Unlike blog freshness (a live
# URL), the batch's landed signal is the committed deliverable folder
# marketing_deliverables/<n>_studio_weekly_<Mon-date>. max_age_hours: 0 disables
# it (default) -- the current LAPTOP engine does not reliably commit its folder,
# so enabling now would false-alarm on a healthy run. ENABLE at the social-engine
# cloud cutover (the stateless cloud engine commits every run); suggested 240
# (10 days: comfortably clears a weekly cadence, fires only on a genuine miss).
weekly_social:
  max_age_hours: 240   # ENABLED at cutover 2026-07-20: the cloud engine commits its
                       # deliverable folder every run, so 240h (10 days) clears a weekly
                       # cadence and fires only on a genuine miss.
  severity: warn
# monitors: the two Railway-ported laptop dailies (tp-daily 07:15 CT, growth-monitor
# 18:00 CT). Each commits a dated block to its avo-telemetry state file; freshness of
# the newest block is the signal. 0 disables (default) -- ENABLE each to ~30h at its
# cloud cutover (30h clears a daily cadence, fires on a genuine missed run).
monitors:
  tp_daily_max_age_hours: 30       # ENABLED at cutover 2026-07-20 (both proven green
  growth_monitor_max_age_hours: 30 # in the cloud; laptop plists retired). 30h clears a
                                   # daily cadence, fires on a genuine missed cron run.
emails_sent:
  window_days: 7
  min_prospects_for_alert: 25
# media_worker: the cloud (Railway) off-laptop video render service. Trigger-driven,
# so there is no render cadence to age-check -- the signal is simply reachability of
# its health endpoint. ENABLED (unlike the disabled-until-cutover checks) because the
# worker is already live in the cloud; if it goes down, no video can be produced off
# the laptop. Clearing health_url disables the check (treated as not-yet-deployed).
media_worker:
  health_url: https://media-worker-production-361a.up.railway.app/health
  severity: critical
telemetry:
  repo: salesdroid/avo-telemetry
  max_stale_hours: 48
