# Slipstream engine brand config. Adding a brand = a config edit, not code.
# Only Next.js/Vercel brands with the MDX component kit. WD excluded (no blog
# subsystem yet, mid-rebuild).
brands:
  autointelligence:
    repo: salesdroid/automotive-intelligence
    domain: automotiveintelligence.io
    enabled: true
    blog_dir: src/content/blog
    business_key: autointelligence
    voice: "restrained, diagnostic, anti-hype, operator-grounded"
    money_pages: ["/ai-reality-check", "/diagnostic-call", "/lead-intelligence", "/services"]
    queue_path: automation/content-queue.md
  aiphoneguy:
    repo: salesdroid/ai-phone-guy-site
    domain: theaiphoneguy.com
    enabled: false
    blog_dir: src/content/blog
    business_key: aiphoneguy
    voice: "plainspoken, trade-savvy, anti-hype, for home-service owners"
    money_pages: ["/discovery", "/how-it-works", "/contact"]
    queue_repo: salesdroid/avo-telemetry
    queue_path: scripts/blog_queues/aipg_topics.md
  agentempire:
    repo: salesdroid/buildagentempire
    domain: buildagentempire.com
    enabled: false
    blog_dir: src/content/blog
    business_key: agentempire
    voice: "builder field-notes, honest, ledger-only numbers, no income claims"
    money_pages: ["/10-agents", "/blog"]
    queue_repo: salesdroid/avo-telemetry
    queue_path: scripts/blog_queues/bae_topics.md
