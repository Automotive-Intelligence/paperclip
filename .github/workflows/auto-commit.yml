name: Auto Commit & Push

# Automatically commits and pushes any pending repository changes on a schedule
# so the repo stays up to date without requiring a local machine to be running.
#
# Safety: .gitignore already excludes .env files (secrets), logs/, and build
# artifacts — those files will never be staged or committed by this workflow.

on:
  schedule:
    # Runs every hour — keeps the repo up to date without a local machine running
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push any pending changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — repository is already up to date."
          else
            git commit -m "chore: auto-commit pending changes [skip ci]"
            git push
            echo "Changes committed and pushed successfully."
          fi
