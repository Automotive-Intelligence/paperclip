<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AIBOS Pit Wall</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17; --surface: #131a2b; --surface2: #1a2332;
            --border: #1e2d42; --text: #e2e8f0; --text2: #8899aa;
            --green: #22c55e; --red: #ef4444; --yellow: #eab308;
            --blue: #3b82f6; --cyan: #06b6d4; --purple: #a855f7;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 12px; }
        .pit-wall { max-width: 800px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 12px; }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        .header h1 span { color: var(--cyan); }
        .header-right { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text2); }
        .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        /* Alerts */
        .alerts { margin-bottom: 16px; }
        .alert { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; color: #fca5a5; display: flex; align-items: center; gap: 8px; }
        .alert::before { content: "!"; background: var(--red); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

        /* Business sections */
        .biz-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .biz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .biz-name { font-size: 15px; font-weight: 700; }
        .biz-crm { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 3px 8px; border-radius: 4px; }
        .metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        .metric-box { background: var(--surface2); border-radius: 8px; padding: 10px; text-align: center; }
        .metric-val { font-size: 24px; font-weight: 700; color: var(--cyan); }
        .metric-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* Agent health */
        .agent-health { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .agent-health h2 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .agent-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .agent-row:last-child { border-bottom: none; }
        .agent-info { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.green { background: var(--green); }
        .status-dot.red { background: var(--red); }
        .status-dot.yellow { background: var(--yellow); }
        .agent-name { font-size: 13px; font-weight: 600; }
        .agent-role { font-size: 11px; color: var(--text2); }
        .agent-time { font-size: 11px; color: var(--text2); text-align: right; }
        .agent-preview { font-size: 11px; color: var(--text2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* COO Report */
        .coo-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .coo-section h2 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .coo-priority { background: var(--surface2); border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.5; color: var(--text); }

        /* Footer */
        .footer { text-align: center; padding: 16px 0; font-size: 11px; color: var(--text2); }
        .refresh-note { font-size: 10px; color: var(--text2); opacity: 0.6; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text2); }
    </style>
</head>
<body>
    <div class="pit-wall">
        <div class="header">
            <h1><span>AIBOS</span> Pit Wall</h1>
            <div class="header-right">
                <div class="pulse"></div>
                <span id="clock"></span>
            </div>
        </div>

        <div class="alerts" id="alerts"></div>
        <div id="businesses"></div>
        <div class="agent-health" id="agent-health">
            <h2>Agent Health</h2>
            <div class="loading">Loading...</div>
        </div>
        <div class="coo-section" id="coo-section">
            <h2>COO Command Report</h2>
            <div class="loading">Waiting for first report...</div>
        </div>
        <div class="footer">
            <div class="refresh-note">Auto-refreshes every 60s</div>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        function relTime(iso) {
            if (!iso) return 'Never';
            const d = new Date(iso);
            const now = new Date();
            const mins = Math.round((now - d) / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.round(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.round(hrs / 24) + 'd ago';
        }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
        }
        setInterval(updateClock, 10000);
        updateClock();

        async function refresh() {
            try {
                const res = await fetch(API + '/api/pitwall/ops-dashboard');
                if (!res.ok) throw new Error('API error');
                const d = await res.json();
                renderAlerts(d.coo_report);
                renderBusinesses(d);
                renderAgentHealth(d.agent_health);
                renderCOO(d.coo_report);
            } catch (e) {
                console.error('Refresh failed:', e);
            }
        }

        function renderAlerts(coo) {
            const el = document.getElementById('alerts');
            if (!coo || !coo.alerts || coo.alerts.length === 0) { el.innerHTML = ''; return; }
            el.innerHTML = coo.alerts.map(a => `<div class="alert">${a.message}</div>`).join('');
        }

        function renderBusinesses(d) {
            const el = document.getElementById('businesses');
            const bizdefs = [
                { key: 'aiphoneguy', name: 'The AI Phone Guy', crm: 'GoHighLevel', agent: 'tyler' },
                { key: 'callingdigital', name: 'Calling Digital', crm: 'Attio', agent: 'marcus' },
                { key: 'autointelligence', name: 'Automotive Intelligence', crm: 'HubSpot', agent: 'ryan_data' },
            ];
            el.innerHTML = bizdefs.map(biz => {
                const today = (d.crm_today || {})[biz.agent] || {};
                const week = (d.crm_week || {})[biz.agent] || {};
                const created_today = today.created || 0;
                const created_week = week.created || 0;
                return `
                <div class="biz-section">
                    <div class="biz-header">
                        <div class="biz-name">${biz.name}</div>
                        <div class="biz-crm">${biz.crm}</div>
                    </div>
                    <div class="metrics-row">
                        <div class="metric-box">
                            <div class="metric-val">${created_today}</div>
                            <div class="metric-label">Prospects Today</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-val">${created_week}</div>
                            <div class="metric-label">This Week</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-val">${(today.duplicate_skipped || 0) + created_today}</div>
                            <div class="metric-label">Total Pushes</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderAgentHealth(agents) {
            const el = document.getElementById('agent-health');
            if (!agents || agents.length === 0) {
                el.innerHTML = '<h2>Agent Health</h2><div class="loading">No agent data</div>';
                return;
            }
            const rows = agents.map(a => {
                const dotClass = a.status === 'green' ? 'green' : (a.status === 'yellow' ? 'yellow' : 'red');
                const preview = (a.log_preview || '').substring(0, 80);
                return `
                <div class="agent-row">
                    <div class="agent-info">
                        <div class="status-dot ${dotClass}"></div>
                        <div>
                            <div class="agent-name">${a.name}</div>
                            <div class="agent-role">${a.role}</div>
                        </div>
                    </div>
                    <div>
                        <div class="agent-time">${relTime(a.last_run)}</div>
                        ${preview ? `<div class="agent-preview">${preview.replace(/</g,'&lt;')}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
            el.innerHTML = `<h2>Agent Health (${agents.length})</h2>${rows}`;
        }

        function renderCOO(report) {
            const el = document.getElementById('coo-section');
            if (!report) {
                el.innerHTML = '<h2>COO Command</h2><div class="loading">No report yet</div>';
                return;
            }
            const gen = report.generated_at ? new Date(report.generated_at).toLocaleString() : 'Unknown';
            el.innerHTML = `
                <h2>COO Command</h2>
                <div style="font-size:11px;color:var(--text2);margin-bottom:10px;">Generated: ${gen}</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
                    <div class="metric-box">
                        <div class="metric-val" style="color:var(--green)">${report.agents_ran || 0}</div>
                        <div class="metric-label">Agents Ran</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-val" style="color:${(report.agents_missed || 0) > 0 ? 'var(--red)' : 'var(--green)'}">${report.agents_missed || 0}</div>
                        <div class="metric-label">Missed</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-val" style="color:${(report.alert_count || 0) > 0 ? 'var(--yellow)' : 'var(--green)'}">${report.alert_count || 0}</div>
                        <div class="metric-label">Alerts</div>
                    </div>
                </div>
                <div class="coo-priority">${report.priority_recommendation || 'No recommendation'}</div>
            `;
        }

        // Initial load + auto-refresh
        refresh();
        setInterval(refresh, 60000);
    </script>
</body>
</html>
