<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip — AI Command Center</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #090909; --surface: #111; --card: #181818;
            --border: #252525; --text: #e8e8e8; --muted: #666;
            --accent: #00B4D8; --accent-bg: rgba(0,180,216,0.12);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; align-items: center; padding: 0 24px; height: 56px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .header-sub { margin-left: 12px; font-size: 12px; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 20px; }
        .business-bar { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .biz-tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
        .biz-tab:hover { color: var(--text); }
        .biz-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; flex-shrink: 0; }
        .sidebar-label { padding: 16px 16px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
        .agent-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent; }
        .agent-item:hover { background: var(--card); }
        .agent-item.active { background: var(--accent-bg); border-left-color: var(--accent); }
        .agent-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
        .agent-info { flex: 1; min-width: 0; }
        .agent-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-role { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .chat-header-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
        .chat-header-name { font-size: 15px; font-weight: 600; }
        .chat-header-role { font-size: 12px; color: var(--muted); }
        .chat-header-biz { margin-left: auto; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); text-align: center; gap: 12px; }
        .welcome-icon { font-size: 48px; }
        .welcome h2 { font-size: 20px; color: var(--text); font-weight: 600; }
        .welcome p { font-size: 14px; max-width: 300px; line-height: 1.5; }
        .msg { display: flex; gap: 12px; max-width: 820px; }
        .msg.user { flex-direction: row-reverse; align-self: flex-end; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
        .msg-content { flex: 1; }
        .msg-name { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
        .msg.user .msg-name { text-align: right; }
        .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; background: var(--card); word-break: break-word; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble strong { font-weight: 600; color: var(--text); }
        .msg.user .msg-bubble { background: var(--accent-bg); border: 1px solid rgba(255,255,255,0.06); }
        .typing { display: flex; gap: 12px; align-items: center; }
        .dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--card); border-radius: 12px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        .input-area { padding: 16px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 8px 16px; transition: border-color 0.15s; }
        .input-row:focus-within { border-color: var(--accent); }
        textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; }
        textarea::placeholder { color: var(--muted); }
        .send-btn { width: 34px; height: 34px; border-radius: 8px; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; transition: opacity 0.15s; }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">📎 Paper<span>clip</span></div>
    <div class="header-sub">AI Command Center</div>
</div>

<div class="business-bar">
    <button class="biz-tab active" data-biz="aiphoneguy" onclick="selectBusiness('aiphoneguy')">📱 The AI Phone Guy</button>
    <button class="biz-tab" data-biz="callingdigital" onclick="selectBusiness('callingdigital')">💻 Calling Digital</button>
    <button class="biz-tab" data-biz="autointelligence" onclick="selectBusiness('autointelligence')">🚗 Automotive Intelligence</button>
</div>

<div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="chat" id="chat">
        <div class="messages" id="messages">
            <div class="welcome">
                <div class="welcome-icon">📎</div>
                <h2>Paperclip Command Center</h2>
                <p>Select an agent from the sidebar to start a conversation</p>
            </div>
        </div>
        <div class="input-area" id="input-area" style="display:none">
            <div class="input-row">
                <textarea id="msg-input" placeholder="Message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
const BUSINESSES = {
    aiphoneguy: {
        name: 'The AI Phone Guy', accent: '#00B4D8', accentBg: 'rgba(0,180,216,0.12)',
        agents: [
            { id: 'alex', name: 'Alex', role: 'CEO' },
            { id: 'tyler', name: 'Tyler', role: 'Head of Sales' },
            { id: 'zoe', name: 'Zoe', role: 'Head of Marketing' },
            { id: 'jennifer', name: 'Jennifer Rodriguez', role: 'Head of Client Success' }
        ]
    },
    callingdigital: {
        name: 'Calling Digital', accent: '#8B5CF6', accentBg: 'rgba(139,92,246,0.12)',
        agents: [
            { id: 'dek', name: 'Dek', role: 'CEO' },
            { id: 'marcus', name: 'Marcus', role: 'Head of Sales & BizDev' },
            { id: 'sofia', name: 'Sofia', role: 'Head of Content' },
            { id: 'carlos', name: 'Carlos', role: 'Head of Client Success' },
            { id: 'nova', name: 'Nova', role: 'AI Implementation Director' }
        ]
    },
    autointelligence: {
        name: 'Automotive Intelligence', accent: '#F59E0B', accentBg: 'rgba(245,158,11,0.12)',
        agents: [
            { id: 'michael-mata', name: 'Michael Mata', role: 'CEO' },
            { id: 'ryan-data', name: 'Ryan Data', role: 'CRO' },
            { id: 'chase', name: 'Chase', role: 'Head of Marketing' },
            { id: 'atlas', name: 'Atlas', role: 'Research Analyst' },
            { id: 'phoenix', name: 'Phoenix', role: 'Head of Implementation' }
        ]
    }
};

let currentBiz = 'aiphoneguy', currentAgent = null, isLoading = false;
let histories = {};

function setAccent(c, b) {
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--accent-bg', b);
}

function selectBusiness(biz) {
    currentBiz = biz; currentAgent = null;
    document.querySelectorAll('.biz-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-biz="${biz}"]`).classList.add('active');
    const b = BUSINESSES[biz];
    setAccent(b.accent, b.accentBg);
    renderSidebar();
    const ch = document.getElementById('chat-header');
    if (ch) ch.remove();
    document.getElementById('messages').innerHTML = `<div class="welcome"><div class="welcome-icon">📎</div><h2>${b.name}</h2><p>Select an agent to start a conversation</p></div>`;
    document.getElementById('input-area').style.display = 'none';
}

function renderSidebar() {
    const b = BUSINESSES[currentBiz];
    document.getElementById('sidebar').innerHTML = '<div class="sidebar-label">Agents</div>' +
        b.agents.map(a => `<div class="agent-item ${currentAgent===a.id?'active':''}" onclick="selectAgent('${a.id}')">
            <div class="agent-avatar" style="background:${b.accentBg};color:${b.accent}">${a.name[0]}</div>
            <div class="agent-info"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
        </div>`).join('');
}

function selectAgent(id) {
    currentAgent = id; renderSidebar();
    const b = BUSINESSES[currentBiz];
    const a = b.agents.find(x => x.id === id);
    let ch = document.getElementById('chat-header');
    if (!ch) { ch = document.createElement('div'); ch.id = 'chat-header'; ch.className = 'chat-header'; document.getElementById('chat').insertBefore(ch, document.getElementById('messages')); }
    ch.innerHTML = `<div class="chat-header-avatar" style="background:${b.accentBg};color:${b.accent}">${a.name[0]}</div>
        <div><div class="chat-header-name">${a.name}</div><div class="chat-header-role">${a.role}</div></div>
        <div class="chat-header-biz" style="background:${b.accentBg};color:${b.accent}">${b.name}</div>`;
    const msgs = document.getElementById('messages');
    if (histories[id]?.length) {
        msgs.innerHTML = histories[id].map(m => renderMsg(m.role, m.text, a, b)).join('');
    } else {
        msgs.innerHTML = `<div class="welcome"><div class="welcome-icon" style="color:${b.accent};font-size:36px;width:60px;height:60px;border-radius:50%;background:${b.accentBg};display:flex;align-items:center;justify-content:center;font-weight:700">${a.name[0]}</div><h2>${a.name}</h2><p>${a.role}</p></div>`;
    }
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('msg-input').focus();
    msgs.scrollTop = msgs.scrollHeight;
}

function fmt(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

function renderMsg(role, text, agent, biz) {
    const b = biz || BUSINESSES[currentBiz];
    const a = agent || b.agents.find(x => x.id === currentAgent);
    if (role === 'user') return `<div class="msg user"><div class="msg-content"><div class="msg-name">You</div><div class="msg-bubble">${fmt(text)}</div></div><div class="msg-avatar" style="background:#2a2a2a;color:#888">M</div></div>`;
    return `<div class="msg"><div class="msg-avatar" style="background:${b.accentBg};color:${b.accent}">${a.name[0]}</div><div class="msg-content"><div class="msg-name">${a.name}</div><div class="msg-bubble">${fmt(text)}</div></div></div>`;
}

async function sendMessage() {
    if (isLoading || !currentAgent) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    const b = BUSINESSES[currentBiz];
    const a = b.agents.find(x => x.id === currentAgent);
    input.value = ''; input.style.height = 'auto';
    if (!histories[currentAgent]) histories[currentAgent] = [];
    histories[currentAgent].push({ role: 'user', text });
    const msgs = document.getElementById('messages');
    msgs.innerHTML = histories[currentAgent].map(m => renderMsg(m.role, m.text, a, b)).join('');
    const tid = 't' + Date.now();
    msgs.innerHTML += `<div class="typing" id="${tid}"><div class="msg-avatar" style="background:${b.accentBg};color:${b.accent}">${a.name[0]}</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    isLoading = true; document.getElementById('send-btn').disabled = true;
    try {
        const res = await fetch(`/chat/${currentAgent}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: text}) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        document.getElementById(tid)?.remove();
        histories[currentAgent].push({ role: 'agent', text: data.response });
        msgs.innerHTML = histories[currentAgent].map(m => renderMsg(m.role, m.text, a, b)).join('');
        msgs.scrollTop = msgs.scrollHeight;
    } catch(err) {
        document.getElementById(tid)?.remove();
        msgs.innerHTML += renderMsg('agent', `⚠️ Error: ${err.message}`, a, b);
        msgs.scrollTop = msgs.scrollHeight;
    } finally {
        isLoading = false; document.getElementById('send-btn').disabled = false; input.focus();
    }
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

setAccent(BUSINESSES.aiphoneguy.accent, BUSINESSES.aiphoneguy.accentBg);
renderSidebar();
</script>
</body>
</html>
